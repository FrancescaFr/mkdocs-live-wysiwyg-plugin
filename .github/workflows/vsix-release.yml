name: VSIX Release (Manual)

on:
  workflow_dispatch:

jobs:
  vsix-build:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build VSIX
        run: make -C vsx-src build

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: vsx-src/dist/*.vsix

  vsix-publish:
    runs-on: ubuntu-latest
    needs: vsix-build
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix
          path: vsx-src/dist/

      - name: Get version
        id: version
        run: echo "version=$(grep -oP '^version = "\K[^"]+' pyproject.toml)" >> $GITHUB_OUTPUT

      - name: Publish to GitHub Releases
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          gh release create "$TAG" vsx-src/dist/*.vsix \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag \
          || gh release upload "$TAG" vsx-src/dist/*.vsix \
            --repo "${{ github.repository }}" \
            --clobber

      # TODO: enable after setting up VSCE_PAT and OVSX_PAT secrets
